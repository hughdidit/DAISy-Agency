name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "Docker release run ID (release-metadata source)"
        required: true
      image_ref:
        description: "Optional override: full image ref"
        required: false
      dry_run:
        description: "If true, do not perform real deployment"
        required: true
        default: true
        type: boolean
      deploy_monitoring:
        description: "If true, deploy monitoring/diagnostics stack after app deploy"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: promote-production
  cancel-in-progress: false

jobs:
  deploy_prod:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      release_run_id: ${{ inputs.release_run_id }}
      image_ref: ${{ inputs.image_ref }}
      dry_run: ${{ inputs.dry_run }}
      deploy_monitoring: ${{ inputs.deploy_monitoring }}
    secrets: inherit

  verify_prod:
    needs: deploy_prod
    if: ${{ inputs.dry_run != true }}
    uses: ./.github/workflows/verify.yml
    with:
      environment: production
    secrets: inherit
