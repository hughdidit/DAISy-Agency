# Alertmanager configuration for DAISy-Agency
# Routes alerts to Discord webhook and email.
#
# Env vars are expanded at startup via --config.expand-env flag.
# Credentials come from .env.monitoring (never hardcoded).

global:
  resolve_timeout: 5m
  smtp_smarthost: "$ALERT_SMTP_HOST:$ALERT_SMTP_PORT"
  smtp_from: "$ALERT_SMTP_FROM"
  smtp_auth_username: "$ALERT_SMTP_USERNAME"
  smtp_auth_password: "$ALERT_SMTP_PASSWORD"
  smtp_require_tls: true

templates:
  - /etc/alertmanager/discord.tmpl

# Inhibition: critical suppresses warning for the same alert
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname]

route:
  receiver: discord-email
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  routes:
    # Critical: immediate — Discord + email, short repeat
    - matchers:
        - severity = critical
      receiver: discord-email
      repeat_interval: 4h
      continue: false

    # Warning: 15 min — Discord + email
    - matchers:
        - severity = warning
      receiver: discord-email
      repeat_interval: 12h
      continue: false

    # Info: best effort — Discord only
    - matchers:
        - severity = info
      receiver: discord-only
      repeat_interval: 24h
      continue: false

    # Dead man's switch — routed to a no-op or external watchdog
    - matchers:
        - alertname = Watchdog
      receiver: deadmans-switch
      repeat_interval: 1m
      continue: false

receivers:
  # Discord webhook with Discord-compatible JSON payload.
  # The webhook URL must end with /slack for Discord's Slack-compatible endpoint,
  # which accepts Alertmanager's default payload format without an adapter.
  # Example: https://discord.com/api/webhooks/ID/TOKEN/slack
  - name: discord-email
    slack_configs:
      - api_url: "$DISCORD_ALERTS_WEBHOOK_URL"
        send_resolved: true
        title: "{{ .CommonLabels.alertname }}"
        text: '{{ template "discord.message" . }}'
    email_configs:
      - to: "$ALERT_EMAIL_TO"
        send_resolved: true
        headers:
          Subject: >-
            [{{ .Status | toUpper }}] DAISy Alert: {{ .CommonLabels.alertname }}
        html: |
          <h2>{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}</h2>
          <p><b>Severity:</b> {{ .CommonLabels.severity }}</p>
          {{ range .Alerts }}
          <p><b>Summary:</b> {{ .Annotations.summary }}</p>
          <p>{{ .Annotations.description }}</p>
          <p><b>Started:</b> {{ .StartsAt }}</p>
          {{ if eq .Status "resolved" }}<p><b>Resolved:</b> {{ .EndsAt }}</p>{{ end }}
          <hr>
          {{ end }}

  - name: discord-only
    slack_configs:
      - api_url: "$DISCORD_ALERTS_WEBHOOK_URL"
        send_resolved: true
        title: "{{ .CommonLabels.alertname }}"
        text: '{{ template "discord.message" . }}'

  # Dead man's switch receiver — can be wired to an external heartbeat endpoint
  - name: deadmans-switch
    webhook_configs: []
