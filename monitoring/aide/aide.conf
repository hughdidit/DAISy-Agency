# AIDE (Advanced Intrusion Detection Environment) Configuration
# File Integrity Monitoring for DAISy-Agency
#
# Install: sudo apt-get install -y aide aide-common
# Init:    sudo aideinit && sudo cp /var/lib/aide/aide.db.new /var/lib/aide/aide.db
# Check:   sudo aide --check --config=/opt/DAISy/monitoring/aide/aide.conf
#
# Cron (every 15 minutes):
#   */15 * * * * root /opt/DAISy/monitoring/aide/aide-check.sh

# Database locations
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new
database_new=file:/var/lib/aide/aide.db.new

# Report settings
report_url=file:/var/log/aide/aide-report.log
report_url=stdout
verbose=5
report_attributes=sha256

# ═══════════════════════════════════════════════════════════
# Rule definitions
# ═══════════════════════════════════════════════════════════

# Full check: permissions + ownership + size + timestamps + checksums
FULL = p+i+n+u+g+s+b+m+c+sha256+xattrs

# Content only: just check if file content changed
CONTENT = sha256

# Directory: track permissions and ownership changes
DIR = p+i+n+u+g

# Log files: only grow, never shrink (detect truncation)
LOG = p+u+g+i+n+S

# Binary: full check + detect any modification
BIN = p+i+n+u+g+s+b+m+c+sha256+xattrs+e2fsattrs


# ═══════════════════════════════════════════════════════════
# CRITICAL: Application deployment files
# ═══════════════════════════════════════════════════════════

# Docker compose and deployment configs
/opt/DAISy/docker-compose.yml         FULL
/opt/DAISy/docker-compose.host.yml    FULL
/opt/DAISy/docker-compose.sandbox.yml FULL

# Application config (secrets - detect any change)
/opt/DAISy/config                     DIR
/opt/DAISy/config/openclaw.json       FULL

# Environment file (contains secrets)
/opt/DAISy/.env                       FULL


# ═══════════════════════════════════════════════════════════
# CRITICAL: Monitoring stack configs (self-protection)
# ═══════════════════════════════════════════════════════════

/opt/DAISy/monitoring                                      DIR
/opt/DAISy/monitoring/docker-compose.monitoring.yml        FULL
/opt/DAISy/monitoring/prometheus/prometheus.yml             FULL
/opt/DAISy/monitoring/prometheus/alerts.yml                 FULL
/opt/DAISy/monitoring/alertmanager/alertmanager.yml         FULL
/opt/DAISy/monitoring/falco/falco.yaml                     FULL
/opt/DAISy/monitoring/falco/rules                          DIR
/opt/DAISy/monitoring/falco/rules/daisy-agent-rules.yaml   FULL
/opt/DAISy/monitoring/loki/loki-config.yml                 FULL
/opt/DAISy/monitoring/promtail/promtail-config.yml         FULL
/opt/DAISy/monitoring/watchdog/process-allowlist.yml        FULL
/opt/DAISy/monitoring/aide/aide.conf                       FULL
/opt/DAISy/monitoring/apparmor/openclaw-container           FULL
/opt/DAISy/monitoring/seccomp/daisy-seccomp.json           FULL
/opt/DAISy/monitoring/setup-permissions.sh                 FULL


# ═══════════════════════════════════════════════════════════
# CRITICAL: System binaries and configs
# ═══════════════════════════════════════════════════════════

# Docker binaries
/usr/bin/docker                    BIN
/usr/bin/dockerd                   BIN
/usr/bin/containerd                BIN
/usr/bin/runc                      BIN

# System binaries
/usr/bin                           DIR
/usr/sbin                          DIR
/bin                               DIR
/sbin                              DIR

# Critical system configs
/etc/passwd                        FULL
/etc/shadow                        FULL
/etc/group                         FULL
/etc/sudoers                       FULL
/etc/sudoers.d                     DIR
/etc/ssh/sshd_config               FULL
/etc/pam.d                         DIR

# Cron jobs (detect persistence)
/etc/crontab                       FULL
/etc/cron.d                        DIR
/etc/cron.daily                    DIR
/etc/cron.hourly                   DIR
/var/spool/cron                    DIR

# Systemd units (detect new services)
/etc/systemd/system                DIR
/usr/lib/systemd/system            DIR

# AppArmor / security
/etc/apparmor.d                    DIR
/etc/audit/rules.d                 DIR


# ═══════════════════════════════════════════════════════════
# WARNING: Docker overlay filesystem
# (detects changes to container images at rest)
# ═══════════════════════════════════════════════════════════

# Track Docker image layers (detect image tampering)
/var/lib/docker/overlay2           DIR


# ═══════════════════════════════════════════════════════════
# INFO: Log files (detect truncation/deletion)
# ═══════════════════════════════════════════════════════════

/var/log/falco                     DIR
/var/log/falco/events.json         LOG
/var/log/daisy-watchdog            DIR
/var/log/daisy-watchdog/audit.log  LOG
/var/log/audit/audit.log           LOG
/var/log/syslog                    LOG
/var/log/auth.log                  LOG


# ═══════════════════════════════════════════════════════════
# Exclusions (noisy paths that change frequently)
# ═══════════════════════════════════════════════════════════

# Container runtime state (changes constantly)
!/var/lib/docker/containers
!/var/lib/docker/overlay2/*/diff
!/var/lib/docker/overlay2/*/work
!/var/lib/docker/overlay2/*/merged
!/var/lib/docker/network
!/var/lib/docker/volumes

# Runtime/temp files
!/proc
!/sys
!/dev
!/run
!/tmp
!/var/tmp
!/var/cache

# Monitoring data volumes (change by design)
!/var/lib/prometheus
!/var/lib/grafana
!/var/lib/loki

# Application workspace (agent-generated, changes frequently)
!/opt/DAISy/workspace

# Node modules (too many files, changes on deploy)
!/opt/DAISy/node_modules
