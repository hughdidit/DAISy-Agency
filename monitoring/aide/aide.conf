# AIDE configuration for DAISy-Agency
# File integrity monitoring — detects unauthorized modifications to
# critical files on the host VM.
#
# Install: apt-get install -y aide
# Initialize: aide --init --config /opt/DAISy/monitoring/aide/aide.conf
# Check: aide --check --config /opt/DAISy/monitoring/aide/aide.conf
#
# Cron (every 15 min):
#   */15 * * * * /usr/bin/aide --check --config /opt/DAISy/monitoring/aide/aide.conf 2>&1 | logger -t aide-check
#
# Zero-trust: AIDE monitors the monitoring directory itself, so an
# attacker who compromises the host cannot silently modify alert rules.

# Database locations
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new
database_new=file:/var/lib/aide/aide.db.new

# What to check
# CONTENT_EX: full content + extended attributes
CONTENT_EX = sha256+ftype+p+u+g+n+acl+selinux+xattrs

# DATAONLY: just content hash (for large dirs)
DATAONLY = sha256+ftype

# ── Application Configuration ───────────────────────────────────────

# Docker compose files — detect unauthorized deployment config changes
/opt/DAISy/docker-compose.yml CONTENT_EX
/opt/DAISy/docker-compose.host.yml CONTENT_EX
/opt/DAISy/docker-compose.sandbox.yml CONTENT_EX

# Application secrets — detect tampering
/opt/DAISy/.env CONTENT_EX

# ── Monitoring Configuration (self-monitoring) ──────────────────────
# Zero-trust: the monitoring stack watches itself

/opt/DAISy/monitoring/docker-compose.monitoring.yml CONTENT_EX
/opt/DAISy/monitoring/prometheus/prometheus.yml CONTENT_EX
/opt/DAISy/monitoring/prometheus/alerts.yml CONTENT_EX
/opt/DAISy/monitoring/alertmanager/alertmanager.yml CONTENT_EX
/opt/DAISy/monitoring/alertmanager/discord.tmpl CONTENT_EX
/opt/DAISy/monitoring/falco/falco.yaml CONTENT_EX
/opt/DAISy/monitoring/falco/rules/daisy-agent-rules.yaml CONTENT_EX
/opt/DAISy/monitoring/grafana/grafana.ini CONTENT_EX
/opt/DAISy/monitoring/loki/loki-config.yml CONTENT_EX
/opt/DAISy/monitoring/promtail/promtail-config.yml CONTENT_EX

# ── Persistent State ────────────────────────────────────────────────

# DAISy state directory — detect unauthorized state modifications
/var/lib/daisy DATAONLY

# ── System Binaries ─────────────────────────────────────────────────

# Docker binaries
/usr/bin/docker CONTENT_EX
/usr/bin/dockerd CONTENT_EX
/usr/bin/containerd CONTENT_EX
/usr/bin/runc CONTENT_EX

# Falco binary
/usr/bin/falco CONTENT_EX

# AIDE binary (self-monitoring: detect replacement of integrity checker)
/usr/bin/aide CONTENT_EX

# Critical system binaries
/usr/bin/sudo CONTENT_EX
/usr/bin/su CONTENT_EX
/usr/bin/passwd CONTENT_EX
/usr/bin/ssh CONTENT_EX
/usr/bin/sshd CONTENT_EX
/usr/sbin/sshd CONTENT_EX

# ── Cron & Scheduled Tasks ──────────────────────────────────────────

/etc/crontab CONTENT_EX
/etc/cron.d CONTENT_EX
/etc/cron.daily CONTENT_EX
/etc/cron.hourly CONTENT_EX
/etc/cron.weekly CONTENT_EX
/etc/cron.monthly CONTENT_EX
/var/spool/cron CONTENT_EX

# ── System Configuration ────────────────────────────────────────────

/etc/passwd CONTENT_EX
/etc/group CONTENT_EX
/etc/shadow CONTENT_EX
/etc/sudoers CONTENT_EX
/etc/sudoers.d CONTENT_EX
/etc/ssh/sshd_config CONTENT_EX

# ── Exclusions ──────────────────────────────────────────────────────
# Exclude volatile paths that change frequently

!/var/log
!/var/lib/docker/overlay2
!/var/lib/docker/containers
!/tmp
!/proc
!/sys
!/run
!/dev
