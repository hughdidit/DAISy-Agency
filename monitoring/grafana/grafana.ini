# Grafana configuration for DAISy-Agency
# Accessible via IAP tunnel port-forward to :3000
# Admin password set via GF_SECURITY_ADMIN_PASSWORD env var

[server]
http_port = 3000
root_url = http://localhost:3000

[security]
admin_user = admin
# Password is set via GF_SECURITY_ADMIN_PASSWORD environment variable
disable_gravatar = true

[auth.anonymous]
enabled = false

[paths]
provisioning = /etc/grafana/provisioning

[log]
mode = console
level = warn

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[alerting]
enabled = false

[unified_alerting]
enabled = false
