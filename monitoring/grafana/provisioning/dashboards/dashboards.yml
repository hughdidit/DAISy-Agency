# Grafana Dashboard Provisioning for DAISy-Agency
# Auto-loads dashboard JSON files from /var/lib/grafana/dashboards/

apiVersion: 1

providers:
  - name: "DAISy Monitoring"
    orgId: 1
    folder: "DAISy"
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
