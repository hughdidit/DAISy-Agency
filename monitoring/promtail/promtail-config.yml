# Promtail configuration for DAISy-Agency
# Ships logs from app, containers, and security tools to Loki.
# Zero-trust: all pipeline stages redact credentials before shipping.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  # ── OpenClaw application logs (JSONL) ──────────────────────────────
  - job_name: openclaw
    static_configs:
      - targets: [localhost]
        labels:
          job: openclaw
          source: app
          __path__: /var/log/openclaw/openclaw-*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            subsystem: subsystem
            message: message
            timestamp: timestamp
      - labels:
          level:
          subsystem:
      # Redact secrets — zero-trust: never log credentials
      - replace:
          expression: "(sk-ant-[a-zA-Z0-9_-]{20,})"
          replace: "[REDACTED_ANTHROPIC_KEY]"
      - replace:
          expression: "(ghp_[a-zA-Z0-9]{36,})"
          replace: "[REDACTED_GITHUB_TOKEN]"
      - replace:
          expression: '(Bearer\s+[a-zA-Z0-9._\-]{20,})'
          replace: "[REDACTED_BEARER_TOKEN]"
      - replace:
          expression: "(sk-[a-zA-Z0-9]{20,})"
          replace: "[REDACTED_API_KEY]"
      - replace:
          expression: '(xoxb-[a-zA-Z0-9\-]+)'
          replace: "[REDACTED_SLACK_TOKEN]"
      - replace:
          expression: '("password"\s*:\s*"[^"]*")'
          replace: '"password":"[REDACTED]"'
      - replace:
          expression: '(mongodb(\+srv)?://[^\s"]+)'
          replace: "[REDACTED_MONGODB_URI]"
      - replace:
          expression: '(AIza[a-zA-Z0-9_\-]{35})'
          replace: "[REDACTED_GOOGLE_KEY]"

  # ── Docker container stdout/stderr ─────────────────────────────────
  - job_name: docker
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            stream: stream
            log: log
      - labels:
          stream:
      # Extract container name from path
      - regex:
          source: filename
          expression: "/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]*/"
      - labels:
          container_id:
      # Redact secrets in container logs — must match openclaw job patterns
      - replace:
          expression: "(sk-ant-[a-zA-Z0-9_-]{20,})"
          replace: "[REDACTED_ANTHROPIC_KEY]"
      - replace:
          expression: "(ghp_[a-zA-Z0-9]{36,})"
          replace: "[REDACTED_GITHUB_TOKEN]"
      - replace:
          expression: '(Bearer\s+[a-zA-Z0-9._\-]{20,})'
          replace: "[REDACTED_BEARER_TOKEN]"
      - replace:
          expression: "(sk-[a-zA-Z0-9]{20,})"
          replace: "[REDACTED_API_KEY]"
      - replace:
          expression: '(xoxb-[a-zA-Z0-9\-]+)'
          replace: "[REDACTED_SLACK_TOKEN]"
      - replace:
          expression: '("password"\s*:\s*"[^"]*")'
          replace: '"password":"[REDACTED]"'
      - replace:
          expression: '(mongodb(\+srv)?://[^\s"]+)'
          replace: "[REDACTED_MONGODB_URI]"
      - replace:
          expression: '(AIza[a-zA-Z0-9_\-]{35})'
          replace: "[REDACTED_GOOGLE_KEY]"

  # ── Falco security events ──────────────────────────────────────────
  - job_name: falco
    static_configs:
      - targets: [localhost]
        labels:
          job: falco
          source: security
          __path__: /var/log/falco/events.json
    pipeline_stages:
      - json:
          expressions:
            rule: rule
            priority: priority
            output: output
      - labels:
          rule:
          priority:

  # ── System auditd logs ─────────────────────────────────────────────
  - job_name: auditd
    static_configs:
      - targets: [localhost]
        labels:
          job: auditd
          source: security
          __path__: /var/log/audit/audit.log

  # ── System syslog ──────────────────────────────────────────────────
  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          __path__: /var/log/syslog

  # ── Watchdog audit trail ───────────────────────────────────────────
  - job_name: watchdog
    static_configs:
      - targets: [localhost]
        labels:
          job: watchdog
          source: security
          __path__: /var/log/daisy-watchdog/audit.jsonl
    pipeline_stages:
      - json:
          expressions:
            event_type: event_type
            severity: severity
            container: container
      - labels:
          event_type:
          severity:
          container:
