# DAISy-Agency Monitoring Stack
# Runs OUTSIDE application containers on the host VM
# Deployed to /opt/DAISy/monitoring/ on the GCP VM
#
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#
# Requires:
#   - Docker with compose v2
#   - Host network access (for container inspection)
#   - /var/run/docker.sock mounted (for cAdvisor)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

services:
  # ─────────────────────────────────────────────────────────
  # Metrics Collection
  # ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: daisy-prometheus
    restart: unless-stopped
    user: "2000:2000"  # daisy-monitor user
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.listen-address=127.0.0.1:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: daisy-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--web.listen-address=127.0.0.1:9100"
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "127.0.0.1:9100:9100"
    pid: host
    networks:
      - monitoring
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: daisy-cadvisor
    restart: unless-stopped
    command:
      - "--port=8080"
      - "--listen_ip=127.0.0.1"
      - "--docker_only=true"
      - "--housekeeping_interval=15s"
      - "--store_container_labels=true"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - monitoring
    logging: *default-logging

  # ─────────────────────────────────────────────────────────
  # Log Aggregation
  # ─────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:2.9.6
    container_name: daisy-loki
    restart: unless-stopped
    user: "2000:2000"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.6
    container_name: daisy-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /tmp/openclaw:/tmp/openclaw:ro
      - promtail-positions:/tmp/positions
    ports:
      - "127.0.0.1:9080:9080"
    networks:
      - monitoring
    logging: *default-logging
    depends_on:
      - loki

  # ─────────────────────────────────────────────────────────
  # Visualization & Alerting
  # ─────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.1
    container_name: daisy-grafana
    restart: unless-stopped
    user: "2000:2000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_HTTP_ADDR=127.0.0.1
      - GF_SERVER_HTTP_PORT=3000
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - monitoring
    logging: *default-logging
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: daisy-alertmanager
    restart: unless-stopped
    user: "2000:2000"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=127.0.0.1:9093"
      - "--cluster.listen-address="
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring
    logging: *default-logging

networks:
  monitoring:
    driver: bridge
    name: daisy-monitoring

volumes:
  prometheus-data:
    name: daisy-prometheus-data
  loki-data:
    name: daisy-loki-data
  grafana-data:
    name: daisy-grafana-data
  alertmanager-data:
    name: daisy-alertmanager-data
  promtail-positions:
    name: daisy-promtail-positions
